services:
  web:
    build:
      context: .
      args:
        RAILS_ENV: development
        BUNDLE_WITHOUT: "production"
    command: ./bin/rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development
    volumes:
      - .:/rails
      - ./storage:/rails/storage
